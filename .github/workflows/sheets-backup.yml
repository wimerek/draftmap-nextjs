# NOTE: Add SHEETS_SPREADSHEET_ID to GitHub repo secrets
# (Settings → Secrets and variables → Actions → New repository secret)
# The same value already lives in Vercel env vars.

name: Weekly Sheets Backup

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set run date
        id: date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Download CSV from Google Sheets
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
        run: |
          mkdir -p data/backups
          curl -fL \
            "https://docs.google.com/spreadsheets/d/${SHEETS_SPREADSHEET_ID}/export?format=csv&gid=0" \
            -o "data/backups/players-backup-${{ steps.date.outputs.date }}.csv"

      - name: Update latest snapshot
        run: |
          cp "data/backups/players-backup-${{ steps.date.outputs.date }}.csv" \
             data/backups/players-latest.csv

      # ── Regenerate the derived outcome-score snapshot ────────────────────────
      # data/outcome-scores.json is the precomputed outcome-scoring index served
      # at runtime by fetchOutcomeScores() (see the Vercel Fluid Active CPU fix).
      # player_seasons is historical, so a weekly refresh is plenty fresh.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate outcome-scores.json
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
        run: npx tsx scripts/build-outcome-scores.ts

      # data/search-index.json is the precomputed lean player index served at runtime
      # by fetchSearchIndex() for /sitemap.xml + /api/search-index. Regenerated here so
      # newly-added players become visible to search/sitemap on the weekly cadence.
      - name: Regenerate search-index.json
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
        run: npx tsx scripts/build-search-index.ts

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backups/ data/outcome-scores.json data/search-index.json
          if git diff --cached --quiet; then
            echo "No changes to commit — backup, outcome scores and search index match previous snapshot."
          else
            git commit -m "chore: weekly sheets backup + outcome scores + search index ${{ steps.date.outputs.date }}"
            git push
          fi
