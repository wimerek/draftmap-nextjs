# NOTE: Add SHEETS_SPREADSHEET_ID to GitHub repo secrets
# (Settings → Secrets and variables → Actions → New repository secret)
# The same value already lives in Vercel env vars.

name: Weekly Sheets Backup

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set run date
        id: date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Download CSV from Google Sheets
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
        run: |
          mkdir -p data/backups
          curl -fL \
            "https://docs.google.com/spreadsheets/d/${SHEETS_SPREADSHEET_ID}/export?format=csv&gid=0" \
            -o "data/backups/players-backup-${{ steps.date.outputs.date }}.csv"

      - name: Update latest snapshot
        run: |
          cp "data/backups/players-backup-${{ steps.date.outputs.date }}.csv" \
             data/backups/players-latest.csv

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backups/
          if git diff --cached --quiet; then
            echo "No changes to commit — backup matches previous snapshot."
          else
            git commit -m "chore: weekly sheets backup ${{ steps.date.outputs.date }}"
            git push
          fi
